<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>크레인 임대 관리 시스템</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:        #eef0f4;
  --bg2:       #f5f6f8;
  --bg3:       #eceef2;
  --bg4:       #e4e6eb;
  --border:    rgba(0,0,0,.08);
  --border2:   rgba(0,0,0,.13);

  --blue:      #2563eb;
  --blue-dim:  rgba(37,99,235,.10);
  --blue-glow: rgba(37,99,235,.20);

  --green:     #059669;
  --green-dim: rgba(5,150,105,.10);
  --amber:     #d97706;
  --amber-dim: rgba(217,119,6,.10);
  --red:       #dc2626;
  --red-dim:   rgba(220,38,38,.09);

  --t1: #1e2230;   /* 기본 텍스트 */
  --t2: #4a5368;   /* 보조 텍스트 */
  --t3: #8b93a8;   /* 3차 텍스트 */

  --sidebar-w: 220px;
  --topbar-h:  64px;
  --r:         10px;
  --font: 'Segoe UI',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--t1);font-size:15px;line-height:1.6}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:#dde0e8;border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:200;transition:transform .25s ease;
}
.sidebar-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:var(--topbar-h);border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-size:15px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.sidebar-toggle{background:none;border:none;color:var(--t2);cursor:pointer;padding:6px;border-radius:7px}
.sidebar-toggle:hover{color:var(--t1);background:rgba(0,0,0,.08)}

.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:9px;
  color:var(--t2);text-decoration:none;font-size:14.5px;font-weight:500;
  margin-bottom:3px;transition:all .15s;
}
.nav-item:hover{background:rgba(0,0,0,.07);color:var(--t1)}
.nav-item.active{background:var(--blue);color:#fff;border:none}
.nav-icon{width:18px;height:18px;flex-shrink:0}

.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.user-name{display:block;font-size:14px;font-weight:700;color:var(--t1)}
.user-role{font-size:12px;color:var(--t2)}

/* ── MAIN ── */
.main-content{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.top-bar{
  position:sticky;top:0;z-index:100;height:var(--topbar-h);
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
}
.top-bar-left{display:flex;align-items:center;gap:14px}
.mobile-toggle{display:none;background:none;border:none;cursor:pointer;color:var(--t2);padding:6px;border-radius:7px}
.page-title{font-size:19px;font-weight:800;color:var(--t1)}
.current-date{font-size:14px;color:var(--t3)}
.page-view{flex:1;padding:28px}

/* ── CARD ── */
.card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:var(--t1)}
.card-body{padding:22px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);
  padding:22px 20px;display:flex;align-items:center;gap:18px;
}
.stat-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:24px;height:24px}
.stat-icon.blue  {background:var(--blue-dim);color:var(--blue)}
.stat-icon.green {background:var(--green-dim);color:var(--green)}
.stat-icon.amber {background:var(--amber-dim);color:var(--amber)}
.stat-icon.red   {background:var(--red-dim);color:var(--red)}
.stat-label{font-size:13px;color:var(--t3);margin-bottom:5px;font-weight:500}
.stat-value{font-size:28px;font-weight:800;color:var(--t1);line-height:1}
.stat-sub{font-size:12.5px;color:var(--t3);margin-top:5px}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12.5px;font-weight:700;color:var(--t3);padding:11px 16px;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.3px;text-transform:uppercase}
td{padding:14px 16px;font-size:14.5px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--t1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap}
.badge-green {background:var(--green-dim);color:var(--green)}
.badge-amber {background:var(--amber-dim);color:var(--amber)}
.badge-red   {background:var(--red-dim);color:var(--red)}
.badge-blue  {background:var(--blue-dim);color:var(--blue)}
.badge-gray  {background:rgba(255,255,255,.08);color:var(--t2)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#3a7de8;box-shadow:0 0 0 3px var(--blue-glow)}
.btn-secondary{background:var(--bg3);color:var(--t2);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg4);color:var(--t1)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-danger:hover{background:rgba(248,113,113,.28)}
.btn-sm{padding:6px 13px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:8px;background:var(--bg3);color:var(--t2);border:1px solid var(--border)}
.btn-icon:hover{background:var(--bg4);color:var(--t1)}
.btn svg{width:15px;height:15px}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-header-left h2{font-size:20px;font-weight:800;color:var(--t1)}
.page-header-left p{font-size:14px;color:var(--t3);margin-top:3px}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{
  padding:9px 14px;border:1px solid var(--border2);border-radius:9px;
  font-size:14px;color:var(--t1);background:var(--bg3);outline:none;transition:border-color .15s;
}
.filter-bar input::placeholder{color:var(--t3)}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.filter-bar select option{background:var(--bg3);color:var(--t1)}
.filter-bar input{min-width:200px}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:10px 20px;font-size:14px;font-weight:600;color:var(--t3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover:not(.active){color:var(--t1)}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.form-group{display:flex;flex-direction:column;gap:7px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;font-weight:700;color:var(--t2);letter-spacing:.2px}
input,select,textarea{
  padding:10px 14px;border:1px solid var(--border2);border-radius:9px;
  font-size:14.5px;color:var(--t1);font-family:var(--font);
  background:var(--bg3);outline:none;transition:border-color .15s;
}
input::placeholder{color:var(--t3)}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
select option{background:var(--bg3);color:var(--t1)}
textarea{resize:vertical;min-height:84px}

/* ── CHECKLIST ── */
.checklist{display:flex;flex-direction:column;gap:9px}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg3);border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
.check-item:hover{border-color:var(--border2)}
.check-item input[type="checkbox"]{width:17px;height:17px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.check-item label{font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;flex:1;margin:0}
.check-item.checked{border-color:rgba(52,211,153,.3)}
.check-item.checked label{color:var(--t3);text-decoration:line-through}

/* ── GRIDS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:52px 20px;color:var(--t3)}
.empty-state svg{width:48px;height:48px;margin:0 auto 14px;opacity:.3;display:block}
.empty-state p{font-size:15px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-container{position:fixed;inset:0;z-index:501;display:flex;align-items:center;justify-content:center;padding:20px;pointer-events:none}
.modal-container.open{pointer-events:auto}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  box-shadow:0 24px 64px rgba(0,0,0,.18);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;
  transform:translateY(16px) scale(.97);opacity:0;transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.modal.open{transform:none;opacity:1}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 26px 0}
.modal-title{font-size:17px;font-weight:800;color:var(--t1)}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg3);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1}
.modal-close:hover{background:var(--bg4);color:var(--t1)}
.modal-body{padding:22px 26px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:18px 26px;border-top:1px solid var(--border)}

/* ── DETAIL ── */
.detail-section{margin-bottom:22px}
.detail-section-title{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.detail-row{display:flex;gap:10px;margin-bottom:9px}
.detail-label{font-size:13px;font-weight:600;color:var(--t3);min-width:115px;flex-shrink:0}
.detail-value{font-size:14px;color:var(--t1)}

/* ── ISSUE CARD ── */
.issue-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:15px;margin-bottom:10px}
.issue-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.issue-date{font-size:12px;color:var(--t3)}
.issue-desc{font-size:14px;color:var(--t2);margin-bottom:9px}
.issue-action{font-size:13px;color:var(--green);font-weight:600}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:9px}
.toast{display:flex;align-items:center;gap:10px;padding:13px 20px;background:var(--t1);border:1px solid var(--border2);color:#fff;border-radius:11px;box-shadow:0 8px 28px rgba(0,0,0,.18);font-size:14.5px;font-weight:500;animation:slideIn .25s ease;min-width:240px}
.toast.success{background:var(--green);border-color:var(--green);color:#fff}
.toast.error{background:var(--red);border-color:var(--red);color:#fff}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}

/* ── AMOUNT ── */
.amount-positive{color:var(--blue);font-weight:700}
.amount-negative{color:var(--red);font-weight:700}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .mobile-toggle{display:flex}
  .stats-grid{grid-template-columns:1fr 1fr}
  .two-col,.form-grid{grid-template-columns:1fr}
  .three-col{grid-template-columns:1fr 1fr}
  .page-view{padding:16px}
}
@media(max-width:480px){
  .stats-grid,.three-col{grid-template-columns:1fr}
}
</style>
</head>

<script>
// ============================================================
// DATA LAYER — localStorage 기반
// 설계 원칙:
//   현재상태만 필요한 것 → update()로 덮어쓰기
//   이력이 필요한 것     → append 방식(새 레코드 추가, 삭제 불가)
// ============================================================

const DB = {
  KEYS: {
    cranes:    'crm_cranes',    // 크레인 기본정보 (현재상태)
    masts:     'crm_masts',     // 마스트 기본정보 (현재상태)
    yards:     'crm_yards',     // 야적장 정보 (현재상태)
    txns:      'crm_txns',      // 입출금 내역 (누적)
    issues:    'crm_issues',    // 점검/이슈 헤더 (누적)
    actions:   'crm_actions',   // 이슈별 조치 이력 (누적 — 핵심)
    siteLog:   'crm_sitelog',   // 크레인 현장배치 이력 (누적)
    mastLog:   'crm_mastlog',   // 마스트 임대 이력 (누적)
    checklists:'crm_checklists',// 출고전 체크리스트 이력 (누적)
    repairs:   'crm_repairs',   // 수리/정비 이력 (누적 — 핵심)
  },
  get(key)       { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } },
  set(key, data) { localStorage.setItem(key, JSON.stringify(data)); },
  nextId(arr)    { return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; },
};

// ── 현재상태 테이블 (update 가능) ──
const CraneDB = {
  all()          { return DB.get(DB.KEYS.cranes); },
  save(d)        { DB.set(DB.KEYS.cranes, d); },
  add(item)      { const a=this.all(); item.id=DB.nextId(a); item.createdAt=today(); a.push(item); this.save(a); return item; },
  update(id,up)  { this.save(this.all().map(c=>c.id===id?{...c,...up}:c)); },
  remove(id)     { this.save(this.all().filter(c=>c.id!==id)); },
  get(id)        { return this.all().find(c=>c.id===id); },
};
const MastDB = {
  all()          { return DB.get(DB.KEYS.masts); },
  save(d)        { DB.set(DB.KEYS.masts, d); },
  add(item)      { const a=this.all(); item.id=DB.nextId(a); item.createdAt=today(); a.push(item); this.save(a); return item; },
  update(id,up)  { this.save(this.all().map(m=>m.id===id?{...m,...up}:m)); },
  remove(id)     { this.save(this.all().filter(m=>m.id!==id)); },
  get(id)        { return this.all().find(m=>m.id===id); },
};

  get(id)        { return this.all().find(y=>y.id===id); },
};

// ── 헬퍼 ──
function today()  { return new Date().toISOString().slice(0,10); }
function nowStr() { return new Date().toISOString().slice(0,16).replace('T',' '); }
function fmtDate(d){ if(!d) return '-'; return String(d).slice(0,10).replace(/-/g,'.'); }
function fmtDT(d)  { if(!d) return '-'; return String(d).replace('T',' ').slice(0,16); }
function fmtMoney(n){ return (n||0).toLocaleString('ko-KR')+'원'; }
function fmtMoneyM(n){ return Math.round((n||0)/10000).toLocaleString('ko-KR')+'만원'; }

const UI = {
  openModal(title, bodyHTML, footerHTML='') {
    const ov=document.getElementById('modalOverlay'), ct=document.getElementById('modalContainer');
    ct.innerHTML=`<div class="modal" id="mainModal">
      <div class="modal-header"><span class="modal-title">${title}</span>
        <button class="modal-close" onclick="UI.closeModal()">×</button></div>
      <div class="modal-body">${bodyHTML}</div>
      ${footerHTML?`<div class="modal-footer">${footerHTML}</div>`:''}
    </div>`;
    ov.classList.add('open'); ct.classList.add('open');
    requestAnimationFrame(()=>document.getElementById('mainModal').classList.add('open'));
  },
  closeModal() {
    const ov=document.getElementById('modalOverlay'), ct=document.getElementById('modalContainer'), m=document.getElementById('mainModal');
    if(m) m.classList.remove('open');
    setTimeout(()=>{ ov.classList.remove('open'); ct.classList.remove('open'); ct.innerHTML=''; },200);
  },
  toast(msg, type='default') {
    const tc=document.getElementById('toastContainer'), el=document.createElement('div');
    el.className=`toast ${type}`; el.innerHTML=`<span>${msg}</span>`;
    tc.appendChild(el); setTimeout(()=>el.remove(),3000);
  },
  confirm(msg, onOk) {
    UI.openModal('확인',`<p style="font-size:14px;color:var(--t2);line-height:1.8;">${msg}</p>`,
      `<button class="btn btn-secondary" onclick="UI.closeModal()">취소</button>
       <button class="btn btn-danger" onclick="UI.closeModal();(${onOk.toString()})()">확인</button>`);
  },

  if (!items.length) return `<p style="font-size:13px;color:var(--t3);padding:12px 0;">이력 없음</p>`;
  return `<div class="timeline">${items.map((it,i)=>`
    <div class="tl-item">
      <div class="tl-dot ${i===0?'tl-dot-first':''}"></div>
      <div class="tl-body">
        <div class="tl-meta">${it.meta}</div>
        <div class="tl-text">${it.text}</div>
        ${it.sub?`<div class="tl-sub">${it.sub}</div>`:''}
      </div>
    </div>`).join('')}</div>`;
}

  const craneEl=document.getElementById('rCrane');
  const craneOpt=craneEl.options[craneEl.selectedIndex];
  const data={
    craneId:parseInt(craneEl.value), craneUid:craneOpt.dataset.uid,

    part:document.getElementById('rPart').value.trim(),

    cost:parseInt(document.getElementById('rCost').value)||0,

function toggleCheck(i){ const cb=document.getElementById(`cb-${i}`); cb.checked=!cb.checked; document.getElementById(`chk-${i}`).classList.toggle('checked',cb.checked); }
function checkAll()   { CHECKLIST_ITEMS.forEach((_,i)=>{ document.getElementById(`cb-${i}`).checked=true; document.getElementById(`chk-${i}`).classList.add('checked'); }); }
function uncheckAll() { CHECKLIST_ITEMS.forEach((_,i)=>{ document.getElementById(`cb-${i}`).checked=false; document.getElementById(`chk-${i}`).classList.remove('checked'); }); }
function saveChecklist() {
  const craneEl=document.getElementById('clCrane');
  if(!craneEl.value) { UI.toast('크레인을 선택하세요.','error'); return; }
  const checked=CHECKLIST_ITEMS.filter((_,i)=>document.getElementById(`cb-${i}`).checked);
  const unchecked=CHECKLIST_ITEMS.filter((_,i)=>!document.getElementById(`cb-${i}`).checked);
  const craneOpt=craneEl.options[craneEl.selectedIndex];
  ChecklistDB.add({

function addMastLog(mastId) {
  const action=document.getElementById('mlAction').value;
  const count=parseInt(document.getElementById('mlCount').value)||0;
  const site=document.getElementById('mlSite').value.trim();
  const date=document.getElementById('mlDate').value;
  const memo=document.getElementById('mlMemo').value.trim();
  if(!count){ UI.toast('수량을 입력하세요.','error'); return; }
  MastLogDB.add({ mastId, mastUid:MastDB.get(mastId).uid, action, count, site, date, memo });
  // 마스트 현재 상태 업데이트
  const m=MastDB.get(mastId);
  if(action==='임대출고') MastDB.update(mastId,{rentCount:(m.rentCount||0)+count, site, status:'임대중'});
  if(action==='반납입고') MastDB.update(mastId,{rentCount:Math.max(0,(m.rentCount||0)-count), status:(m.rentCount-count)<=0?'야적중':'임대중'});
  UI.toast('임대 이력이 추가되었습니다.','success');
  UI.closeModal(); viewMastLog(mastId);
}

let finTab='all';
function renderFinance() {
  const txns=TxnDB.all(), cranes=CraneDB.all(), masts=MastDB.all();
  const thisMonth=new Date().toISOString().slice(0,7);
  const income=txns.filter(t=>t.type==='income'&&t.month===thisMonth).reduce((s,t)=>s+t.amount,0);
  const expense=txns.filter(t=>t.type==='expense'&&t.month===thisMonth).reduce((s,t)=>s+t.amount,0);
  const profit=income-expense;
  document.getElementById('pageView').innerHTML=`
  <div class="page-header">
    <div class="page-header-left"><h2>입출금 관리</h2><p>임대 수입 · 수리비/상하차비 지출 — 월별 누적 관리</p></div>

  </div>
  <div class="three-col" style="margin-bottom:20px;">
    <div class="stat-card"><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div><div class="stat-label">이번달 수입</div><div class="stat-value amount-positive" style="font-size:20px;">${fmtMoneyM(income)}</div><div class="stat-sub">${thisMonth}</div></div>
    </div>
    <div class="stat-card"><div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div><div class="stat-label">이번달 지출</div><div class="stat-value amount-negative" style="font-size:20px;">${fmtMoneyM(expense)}</div><div class="stat-sub">${thisMonth}</div></div>
    </div>
    <div class="stat-card"><div class="stat-icon ${profit>=0?'green':'red'}"><svg viewBox="0 0 24 24" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><div class="stat-label">이번달 순익</div><div class="stat-value ${profit>=0?'amount-positive':'amount-negative'}" style="font-size:20px;">${fmtMoneyM(profit)}</div><div class="stat-sub">${profit>=0?'흑자':'적자'}</div></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header"><span class="card-title">카테고리별 집계 (이번달)</span></div>
    <div class="card-body">
      <div class="two-col">
        <div><div style="font-size:12px;font-weight:700;color:var(--t3);margin-bottom:10px;">입금 항목</div>${catBreakdown(txns,'income',thisMonth)}</div>
        <div><div style="font-size:12px;font-weight:700;color:var(--t3);margin-bottom:10px;">출금 항목</div>${catBreakdown(txns,'expense',thisMonth)}</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">전체 거래 내역 <span style="font-size:12px;color:var(--t3);font-weight:400;">— 누적 ${txns.length}건</span></span>
      <div class="tabs" style="margin:0;border:none;padding:0;">
        <button class="tab-btn ${finTab==='all'?'active':''}" onclick="setFinTab('all')">전체</button>
        <button class="tab-btn ${finTab==='income'?'active':''}" onclick="setFinTab('income')">입금</button>
        <button class="tab-btn ${finTab==='expense'?'active':''}" onclick="setFinTab('expense')">출금</button>
      </div>
    </div>
    <div class="filter-bar" style="padding:12px 16px 0;">
      <input type="text" id="txnSearch" placeholder="현장명 / 크레인 ID 검색" oninput="filterTxnList()">
      <input type="month" id="txnMonth" value="${thisMonth}" onchange="filterTxnList()">
      <select id="txnCat" onchange="filterTxnList()">
        <option value="">전체 카테고리</option>
        <option>크레인임대료</option><option>마스트임대료</option><option>수리비</option><option>상차비</option><option>하차비</option><option>기타</option>
      </select>
    </div>
    <div class="table-wrap"><table id="txnTable">
      <thead><tr><th>구분</th><th>카테고리</th><th>장비</th><th>현장</th><th>금액</th><th>월</th><th>메모</th><th></th></tr></thead>
      <tbody>${[...txns].reverse().map(t=>`
        <tr data-type="${t.type}" data-search="${(t.site+' '+(t.craneUid||t.mastUid||'')).toLowerCase()}" data-month="${t.month||''}" data-cat="${t.category}">
          <td>${t.type==='income'?'<span class="badge badge-blue">입금</span>':'<span class="badge badge-red">출금</span>'}</td>
          <td>${t.category}</td><td style="color:var(--t3);">${t.craneUid||t.mastUid||'—'}</td>
          <td style="color:var(--t3);">${t.site||'—'}</td>
          <td class="${t.type==='income'?'amount-positive':'amount-negative'}">${fmtMoney(t.amount)}</td>
          <td style="color:var(--t3);">${t.month||'—'}</td>
          <td style="color:var(--t3);font-size:13px;">${t.memo||'—'}</td>
          <td><button class="btn btn-icon" onclick="deleteTxn(${t.id})">${UI.icon.trash}</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}
function catBreakdown(txns,type,month) {
  const f=txns.filter(t=>t.type===type&&(!month||t.month===month));
  const map={};
  f.forEach(t=>{ map[t.category]=(map[t.category]||0)+t.amount; });
  const total=Object.values(map).reduce((s,v)=>s+v,0);
  if(!total) return '<p style="font-size:13px;color:var(--t3);">내역 없음</p>';
  return Object.entries(map).map(([cat,amt])=>`
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:14px;color:var(--t2);">${cat}</span>
      <span style="font-size:14px;font-weight:700;color:${type==='income'?'var(--blue)':'var(--red)'};">${fmtMoney(amt)}</span>
    </div>`).join('');
}
function setFinTab(tab) {
  finTab=tab; filterTxnList();
  document.querySelectorAll('.tabs .tab-btn').forEach(b=>{
    const map={all:'전체',income:'입금',expense:'출금'};
    b.classList.toggle('active', b.textContent.trim()===map[tab]);
  });
}
function filterTxnList() {
  const q=(document.getElementById('txnSearch')?.value||'').toLowerCase();
  const month=document.getElementById('txnMonth')?.value||'';
  const cat=document.getElementById('txnCat')?.value||'';
  document.querySelectorAll('#txnTable tbody tr').forEach(r=>{
    r.style.display=((finTab==='all'||r.dataset.type===finTab)&&(!q||r.dataset.search.includes(q))&&(!month||r.dataset.month===month)&&(!cat||r.dataset.cat===cat))?'':'none';
  });
}
function openTxnForm() {
  const cranes=CraneDB.all(), masts=MastDB.all(), thisM=new Date().toISOString().slice(0,7);
  UI.openModal('입출금 내역 추가',`
    <div class="form-grid">
      <div class="form-group"><label>구분 *</label><select id="tType"><option value="income">입금</option><option value="expense">출금</option></select></div>
      <div class="form-group"><label>카테고리 *</label>
        <select id="tCat"><option>크레인임대료</option><option>마스트임대료</option><option>수리비</option><option>상차비</option><option>하차비</option><option>기타</option></select>
      </div>
      <div class="form-group"><label>관련 크레인</label>
        <select id="tCrane"><option value="">선택안함</option>${cranes.map(c=>`<option value="${c.uid}">${c.uid} — ${c.model}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>관련 마스트</label>
        <select id="tMast"><option value="">선택안함</option>${masts.map(m=>`<option value="${m.uid}">${m.uid} — ${m.type}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>현장명</label><input id="tSite" placeholder="강남 래미안 현장"></div>
      <div class="form-group"><label>해당 월 *</label><input type="month" id="tMonth" value="${thisM}"></div>
      <div class="form-group"><label>금액 (원) *</label><input type="number" id="tAmount" placeholder="4500000" min="0"></div>
      <div class="form-group full"><label>메모</label><input id="tMemo" placeholder="세부 내용"></div>
    </div>`,
    `<button class="btn btn-secondary" onclick="UI.closeModal()">취소</button>
     <button class="btn btn-primary" onclick="saveTxn()">저장</button>`
  );
}
function saveTxn() {
  const amount=parseInt(document.getElementById('tAmount').value)||0;
  if(!amount){ UI.toast('금액을 입력하세요.','error'); return; }
  TxnDB.add({
    type:document.getElementById('tType').value, category:document.getElementById('tCat').value,
    craneUid:document.getElementById('tCrane').value||null, mastUid:document.getElementById('tMast').value||null,
    site:document.getElementById('tSite').value.trim(), month:document.getElementById('tMonth').value,
    amount, memo:document.getElementById('tMemo').value.trim(),
  });
  UI.toast('저장되었습니다.','success'); UI.closeModal(); renderFinance();
}
function deleteTxn(id) {
  UI.confirm('이 내역을 삭제하시겠습니까?',()=>{ TxnDB.remove(id); UI.toast('삭제되었습니다.'); renderFinance(); });
}

const App = {
  init() {
    const d=new Date();
    document.getElementById('currentDate').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
    document.querySelectorAll('.nav-item').forEach(item=>{
      item.addEventListener('click',e=>{ e.preventDefault(); this.navigate(item.dataset.page); document.getElementById('sidebar').classList.remove('open'); });
    });
    document.getElementById('sidebarToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
    document.getElementById('mobileToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
    this.navigate('dashboard');
  },
  navigate(page) {
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.page===page));
    const titles={dashboard:'대시보드',crane:'타워크레인 관리',mast:'개별마스트 관리',yard:'야적장 관리',finance:'입출금 관리'};
    document.getElementById('pageTitle').textContent=titles[page]||'';
    ({dashboard:renderDashboard,crane:renderCrane,mast:renderMast,yard:renderYard,finance:renderFinance})[page]?.();
  }
};

tlStyle.textContent=`
.timeline{padding-left:4px}
.tl-item{display:flex;gap:14px;margin-bottom:14px;position:relative}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);border:2px solid var(--bg2);flex-shrink:0;margin-top:5px;position:relative;z-index:1}
.tl-dot-first{background:var(--blue);border-color:var(--blue-dim)}
.tl-item:not(:last-child) .tl-dot::after{content:'';position:absolute;left:50%;transform:translateX(-50%);top:10px;width:2px;height:calc(100% + 10px);background:var(--border)}
.tl-meta{font-size:12px;color:var(--t3);margin-bottom:3px}
.tl-text{font-size:14px;color:var(--t1);font-weight:500}
.tl-sub{font-size:12px;color:var(--t3);margin-top:3px}`;
document.head.appendChild(tlStyle);

document.addEventListener('DOMContentLoaded', ()=>App.init());
</script>
</body>
</html>
